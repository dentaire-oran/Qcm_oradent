<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Imagerie Médicale - ODF & CBCT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #1f2937;
        }
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s ease-out; }
        .opt-btn { transition: all 0.2s ease; border: 2px solid transparent; }
        .opt-btn:hover { background-color: #f3f4f6; border-color: #d1d5db; transform: translateY(-2px); }
        .opt-selected { background-color: #eff6ff !important; border-color: #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
        .opt-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .opt-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .opt-missed { border-color: #22c55e !important; border-style: dashed !important; border-width: 2px !important; }
        .modal-backdrop { background-color: rgba(0,0,0,0.5); transition: opacity 0.3s ease; }
        .modal-content { max-height: 80vh; overflow-y: auto; }
        .explanation-box { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 0.75rem 1rem; margin-top: 1rem; border-radius: 0.5rem; font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <header class="w-full max-w-4xl flex justify-between items-center mb-8 mt-4">
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Révisions Imagerie Médicale</h1>
        <div class="flex gap-3">
            <button onclick="openStatsModal()" class="text-sm font-semibold px-4 py-2 bg-indigo-100 text-indigo-800 rounded-full shadow-sm hover:bg-indigo-200 transition">📊 Tableau de bord</button>
            <div class="text-sm font-semibold px-4 py-2 bg-blue-100 text-blue-800 rounded-full shadow-sm">Question <span id="q-counter">0</span> / 120</div>
        </div>
    </header>

    <div id="quiz-screen" class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-6 sm:p-10 fade-enter fade-enter-active">
        <div class="flex justify-between items-center mb-6">
            <span id="course-badge" class="text-xs sm:text-sm font-bold uppercase tracking-wider text-purple-700 bg-purple-100 px-3 py-1 rounded-full">Course Name</span>
            <span class="text-gray-500 text-sm font-medium">Question <span id="current-q-num">1</span>/120</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-8"><div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
        <h3 id="question-text" class="text-lg sm:text-xl font-semibold mb-8 text-gray-800 leading-snug"></h3>
        <div id="options-container" class="space-y-3 mb-4"></div>
        <div id="explanation-container" class="hidden"></div>
        <div class="flex justify-between items-center border-t pt-6 mt-4">
            <div id="feedback-msg" class="text-sm font-bold opacity-0 transition-opacity"></div>
            <div class="flex gap-3">
                <button id="back-btn" onclick="previousQuestion()" class="px-5 py-2.5 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg shadow transition">◀ Retour</button>
                <button id="validate-btn" onclick="validateAnswer()" class="px-6 py-2.5 bg-gray-800 hover:bg-gray-900 text-white font-semibold rounded-lg shadow transition disabled:opacity-50">Valider</button>
                <button id="next-btn" onclick="nextQuestion()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition hidden">Suivant ➔</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-8 hidden">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold mb-2 text-gray-900">Résultat Final</h2>
            <div class="text-6xl font-black text-blue-600 my-6"><span id="final-score-20">0</span> <span class="text-2xl text-gray-400">/ 20</span></div>
            <p class="text-lg text-gray-600" id="final-stats-text"></p>
            <button onclick="startReviewAll()" class="mt-4 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow transition">🔍 Voir toutes mes réponses</button>
        </div>
        <div class="overflow-hidden rounded-xl border border-gray-200 shadow-sm">
            <table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Module</th><th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Score</th><th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Précision</th></tr></thead><tbody id="stats-table-body"></tbody></table>
        </div>
    </div>

    <div id="stats-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden transition-all">
        <div class="modal-backdrop absolute inset-0 bg-black/50" onclick="closeStatsModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 p-6 modal-content">
            <div class="flex justify-between items-center mb-4"><h3 class="text-2xl font-bold text-gray-800">Tableau de bord en cours</h3><button onclick="closeStatsModal()" class="text-gray-500 hover:text-gray-700 text-3xl leading-5">&times;</button></div>
            <div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Module</th><th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Points obtenus</th><th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">%</th></tr></thead><tbody id="modal-stats-body"></tbody></table></div>
            <div class="mt-6 pt-4 border-t border-gray-200 text-right"><p class="text-sm font-semibold text-gray-700">Total global : <span id="modal-total-points">0.00</span> / 120 points</p><p class="text-xs text-gray-500 mt-1">Note provisoire : <span id="modal-provisional-note">0.00</span> / 20</p><button onclick="closeStatsModal()" class="mt-4 px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Continuer le test</button></div>
        </div>
    </div>

    <script>
        // ---------- Les 120 questions (inchangées) ----------
        const questionsData = [{"course": "Cone Beam", "q": "Quelle est la différence fondamentale entre la TDM conventionnelle et le CBCT concernant le faisceau de rayons X ?", "opts": ["La TDM utilise un faisceau conique", "Le CBCT utilise un faisceau en éventail", "Le CBCT utilise un faisceau conique", "La TDM nécessite plusieurs rotations", "Le CBCT nécessite de multiples rotations"], "ans": [2]}, {"course": "Cone Beam", "q": "Parmi les caractéristiques de l'algorithme de reconstruction du CBCT, lesquelles sont vraies ?", "opts": ["Il s'agit de l'algorithme FDK (Feldkamp, Davis et Kress)", "Il produit des voxels anisotropes", "Il permet une navigation dans trois plans orthogonaux", "Il ne permet pas de rendus volumiques 3D", "Les voxels ont des dimensions identiques en x, y et z"], "ans": [0, 2, 4]}, {"course": "Cone Beam", "q": "Quels sont les éléments constitutifs principaux d'un appareil CBCT ?", "opts": ["Un bras rotatif en forme de C", "Un tube émettant un faisceau en éventail", "Un détecteur bidimensionnel à écran plan", "Un panneau de contrôle pour choisir le FOV", "Une station informatique sans carte graphique"], "ans": [0, 2, 3]}, {"course": "Cone Beam", "q": "Lors de l'acquisition d'un CBCT, la rotation de l'appareil autour de la tête dure généralement :", "opts": ["De 1 à 2 secondes", "De 5 à 40 secondes", "Plus de 60 secondes", "De 6 à 30 secondes en moyenne", "Plusieurs minutes"], "ans": [1, 3]}, {"course": "Cone Beam", "q": "Concernant le nombre de projections (raw data) en CBCT :", "opts": ["Il varie typiquement de 180 à plus de 1024 images", "Un nombre élevé diminue la résolution", "Un nombre élevé réduit les artefacts de reconstruction", "Un nombre élevé augmente le temps d'examen", "Un nombre élevé réduit la dose d'exposition"], "ans": [0, 2, 3]}, {"course": "Cone Beam", "q": "En endodontie, le CBCT est principalement indiqué dans quelles situations ?", "opts": ["En première intention pour le dépistage carieux systématique", "En petit champ (FOV réduit)", "Pour évaluer les canaux radiculaires oblitérés", "En cas de suspicion de résorption radiculaire", "Pour évaluer une tumeur maligne infiltrante"], "ans": [1, 2, 3]}, {"course": "Cone Beam", "q": "Pour le bilan préopératoire d'une extraction de dent de sagesse, le CBCT est prescrit lorsque le panoramique montre :", "opts": ["Une indépendance certaine du canal mandibulaire", "Une superposition des apex avec le canal mandibulaire", "Une dent complètement incluse sans rapport à risque", "La présence d'un crochet apical péri-canalaire suspecté", "Une inclusion haute avec mésioversion au maxillaire"], "ans": [1, 3, 4]}, {"course": "Cone Beam", "q": "En orthodontie, le CBCT petit champ et haute résolution (voxels ≤ 125 µm) est utile pour diagnostiquer :", "opts": ["L'analyse globale pour chirurgie orthognathique", "Une ankylose dentaire", "Une fente palatine", "Une hypercémentose débutante", "Une résorption externe liée à une dent incluse"], "ans": [1, 3, 4]}, {"course": "Cone Beam", "q": "Concernant l'évaluation des sinus et de l'ATM par CBCT :", "opts": ["Il est recommandé en cas de suspicion d'infection fongique sinusienne", "Il constitue une alternative à la TDM pour la rhinosinusite chronique", "Il détecte efficacement l'arthrose condylienne", "Il est la méthode de choix pour évaluer les tissus mous de l'ATM", "Il détecte la condensation des pièces osseuses de l'ATM"], "ans": [1, 2, 4]}, {"course": "Cone Beam", "q": "Parmi les inconvénients majeurs du CBCT, on retrouve :", "opts": ["Une irradiation supérieure à celle d'un scanner conventionnel", "Une faible résolution de contraste pour les tissus mous", "L'incapacité d'explorer les pathologies tumorales infiltrantes", "Des densités exprimées en Unités Hounsfield absolues fiables", "Une résolution spatiale inférieure à celle de la TDM"], "ans": [1, 2]}, {"course": "Cone Beam", "q": "Quelles sont les causes et conséquences des artefacts cinétiques au CBCT ?", "opts": ["Ils sont liés aux restaurations métalliques", "Ils sont dus au mouvement du patient (déglutition)", "Ils créent des bandes noires et blanches", "Ils provoquent un flou de l'image", "Ils causent un dédoublement des structures"], "ans": [1, 3, 4]}, {"course": "Cone Beam", "q": "L'artefact de durcissement du faisceau (beam hardening) se caractérise par :", "opts": ["Une atténuation différentielle des rayons X", "Des zones hyperdenses artificielles près des structures denses", "Un flou cinétique", "La disparition de l'émail dentaire sur l'image", "L'apparition de stries métalliques directes"], "ans": [0, 1]}, {"course": "Cone Beam", "q": "En comparaison avec le scanner conventionnel (CT), le CBCT :", "opts": ["Nécessite un renforcement spécifique du plancher", "A un coût environ 3 à 5 fois inférieur", "Dispose d'un équipement plus léger et compact", "Possède des pixels plus grands", "Peut s'installer facilement dans un cabinet dentaire"], "ans": [1, 2, 4]}, {"course": "Cone Beam", "q": "La préparation et l'installation du patient pour un CBCT incluent :", "opts": ["Le retrait systématique des objets métalliques", "Une position obligatoirement allongée", "L'utilisation d'une mentonnière et d'un appui-tête", "La réalisation d'un topogramme (scout view) pour le centrage", "L'injection obligatoire d'un produit de contraste"], "ans": [0, 2, 3]}, {"course": "Cone Beam", "q": "Comment l'algorithme de reconstruction gère-t-il les données brutes du CBCT ?", "opts": ["Il utilise une carte graphique basse performance", "Il effectue une rétroprojection filtrée", "Il reconstruit un volume anatomique en 3D", "Il transforme des voxels isotropes en pixels anisotropes", "Il encode les données finales en format DICOM"], "ans": [1, 2, 4]}, {"course": "Cone Beam", "q": "Qu'est-ce qui influence la dose d'exposition et la résolution spatiale en CBCT ?", "opts": ["La taille du champ de vue (FOV)", "Le temps d'apnée du patient", "Le nombre de projections acquises", "La température de la salle", "Les paramètres kV et mA"], "ans": [0, 2, 4]}, {"course": "Cone Beam", "q": "Dans le cadre de l'implantologie, l'intérêt du CBCT réside dans :", "opts": ["La visualisation optimale des volumes osseux", "La mesure de la densité osseuse en UH strictes", "L'appréciation de l'architecture de l'os spongieux", "L'évaluation précise des rapports anatomiques", "L'exploration détaillée des fascias musculaires"], "ans": [0, 2, 3]}, {"course": "Cone Beam", "q": "À quel moment l'invention du CBCT dentaire a-t-elle eu lieu ?", "opts": ["En 1972 par Godfrey Hounsfield", "En 1997 par Arai", "Sous le nom initial d'Ortho-CT", "En 1946 par Felix Bloch", "En 2023"], "ans": [1, 2]}, {"course": "Cone Beam", "q": "Pour un CBCT à 'champ moyen' (8 cm) ou 'petit' (4-6 cm) en orthodontie, les indications comprennent :", "opts": ["L'analyse globale pour chirurgie orthognathique", "Les inclusions dentaires et kystes associés", "Les anomalies de nombre", "Les fentes palatines", "L'évaluation des tissus mous pharyngés"], "ans": [1, 2, 3]}, {"course": "Cone Beam", "q": "Les valeurs de densité en CBCT sont :", "opts": ["Des Unités Hounsfield absolues", "Codées sur 12 ou 14 bits en niveaux de gris", "Relatives et dépendantes du FOV", "Variantes selon la position du patient et les artefacts", "Aussi précises que la TDM pour l'analyse quantitative de l'os"], "ans": [1, 2, 3]}, {"course": "Cone Beam", "q": "Quels artefacts sont typiquement liés aux amalgames ou implants au CBCT ?", "opts": ["Artefacts de mouvement", "Stries d'artéfacts métalliques", "Bandes noires et blanches", "Dédoublement de l'image", "Artefact de durcissement du faisceau périphérique"], "ans": [1, 2, 4]}, {"course": "Cone Beam", "q": "Laquelle de ces affirmations sur le capteur d'un CBCT est exacte ?", "opts": ["Il se trouve du même côté que le tube à rayons X", "C'est un détecteur bidimensionnel à écran plat", "Il capture l'image en effectuant de multiples rotations", "Il intercepte le faisceau conique après la traversée du patient", "Il transforme les données numériques en signaux analogiques"], "ans": [1, 3]}, {"course": "Cone Beam", "q": "Lors d'un examen CBCT, le topogramme (scout view) sert principalement à :", "opts": ["Détecter les caries interproximales", "Centrer précisément l'examen", "Définir la zone exacte d'exploration (FOV)", "Visualiser les tissus mous", "Créer le rendu volumique final"], "ans": [1, 2]}, {"course": "Cone Beam", "q": "En CBCT, quelles sont les caractéristiques des voxels ?", "opts": ["Ils sont anisotropes", "Leurs dimensions x, y et z sont strictement identiques", "Leur isotropie empêche la reconstruction curviligne", "Ils permettent des reconstructions multiplanaires sans déformation", "Leur taille n'affecte pas la résolution"], "ans": [1, 3]}, {"course": "Cone Beam", "q": "Quelles recommandations s'appliquent pour les caries dentaires au CBCT ?", "opts": ["C'est l'examen de dépistage de première intention", "Les radiographies rétro-coronaires (bite wing) restent supérieures", "Elles doivent être ignorées lors de l'interprétation d'un CBCT implantologique", "Elles doivent être signalées si découvertes fortuitement", "Le CBCT remplace totalement le bite wing"], "ans": [1, 3]}, {"course": "Cone Beam", "q": "Un petit champ (FOV) en CBCT a pour conséquence :", "opts": ["Une résolution spatiale augmentée", "Une résolution spatiale diminuée", "Une dose d'irradiation augmentée pour le patient", "Une dose d'irradiation diminuée pour le patient", "L'impossibilité de voir la structure fine de la dent"], "ans": [0, 3]}, {"course": "Cone Beam", "q": "Concernant l'exploration des lésions kystiques par CBCT :", "opts": ["Il permet d'identifier les kystes odontogènes de grande taille", "Il différencie parfaitement le contenu liquidien d'un tissu tumoral malin", "Il est formellement indiqué pour explorer une suspicion de malignité", "Il identifie les tumeurs bénignes calcifiées", "Il montre très bien l'extension osseuse de la lésion"], "ans": [0, 3, 4]}, {"course": "Cone Beam", "q": "Comment se comporte le faisceau de rayons X dans le CBCT ?", "opts": ["Il est continu ou pulsé", "Il couvre tout l'organe en une seule rotation complète", "Il irradie uniquement le plan transversal d'une coupe", "Il diverge en forme de cône depuis le tube", "Il nécessite le mouvement du lit du patient"], "ans": [0, 1, 3]}, {"course": "Cone Beam", "q": "Lors du bilan d'une dent de sagesse mandibulaire au CBCT, le praticien cherche à évaluer :", "opts": ["La morphologie radiculaire précise de la dent", "L'épaisseur de la gencive marginale", "Les rapports exacts avec la 2ème molaire", "L'intégrité de la corticale du canal mandibulaire", "Le flux sanguin intra-pulpaire"], "ans": [0, 2, 3]}, {"course": "Cone Beam", "q": "Le volume reconstruit par le CBCT permet de générer :", "opts": ["Des coupes axiales", "Des coupes coronales", "Des coupes sagittales", "Des courbes curvilignes (panoramiques reconstruites)", "Des reconstructions orthogonales à la crête"], "ans": [0, 1, 2, 3, 4]}, {"course": "OPT et TDM", "q": "Le principe de l'orthopantomogramme (OPT) repose sur :", "opts": ["La tomographie rotative à faisceau conique", "La tomographie rotative à faisceau étroit", "L'acquisition d'images 3D natives", "Un axe focal net avec un flou de balayage externe", "L'émission d'un champ magnétique puissant"], "ans": [1, 3]}, {"course": "OPT et TDM", "q": "Parmi les critères de qualité d'un OPT, on recherche :", "opts": ["La visibilité parfaite des deux condyles mandibulaires", "Une asymétrie entre les branches montantes pour l'effet de profondeur", "Le palais dur projeté au-dessus des apex maxillaires", "Une bande radioclaire sombre sur les apex si la langue est bien placée", "L'absence d'artefacts métalliques"], "ans": [0, 2, 4]}, {"course": "OPT et TDM", "q": "Si le patient n'applique pas sa langue contre le palais lors d'un OPT :", "opts": ["Une bande radio-opaque masque les dents mandibulaires", "Une bande radioclaire (air pharyngé) barre les apex maxillaires", "Cela simule de fausses lésions de lyse apicale", "Le contraste global du cliché est amélioré", "Une image fantôme de la langue apparaît"], "ans": [1, 2]}, {"course": "OPT et TDM", "q": "Concernant l'image fantôme sur un OPT :", "opts": ["Elle provient d'un objet de faible densité", "Elle est générée par un objet situé en dehors du plan focal", "Elle se projette de façon nette et précise", "Elle se projette du côté opposé à sa position réelle", "Elle apparaît surélevée et floue"], "ans": [1, 3, 4]}, {"course": "OPT et TDM", "q": "Dans la méthodologie de lecture d'un OPT, le balayage de la région mandibulaire permet d'évaluer :", "opts": ["Les apophyses styloïdes", "Le bord antérieur et postérieur de la branche montante", "Le foramen mentonnier", "L'échancrure sigmoïde et le coroné", "La suture inter-maxillaire"], "ans": [1, 2, 3]}, {"course": "OPT et TDM", "q": "Au scanner (TDM), la 'fenêtre osseuse' est essentielle pour analyser :", "opts": ["La trame osseuse trabéculaire", "La graisse infra-temporale", "La continuité des tables corticales", "Les muscles masticateurs", "Les structures dentaires minéralisées"], "ans": [0, 2, 4]}, {"course": "OPT et TDM", "q": "La classification de Lodwick décrit l'ostéolyse géographique (Type I) comme :", "opts": ["Une lésion très agressive", "IA : contours nets avec liseré d'ostéosclérose", "IB : contours nets sans liseré", "IC : contours mal visibles", "Une lésion perméative"], "ans": [1, 2, 3]}, {"course": "OPT et TDM", "q": "Un processus pathologique malin infiltrant à la mandibule se caractérise radiologiquement par :", "opts": ["Une ostéolyse mitée ou perméative", "Des limites floues et mal définies", "Une soufflure harmonique régulière de la corticale", "Une réaction périostée spiculée (en feu d'herbe) ou un éperon de Codman", "Une rhizalyse extrêmement nette et régulière des dents adjacentes"], "ans": [0, 1, 3]}, {"course": "OPT et TDM", "q": "Le Signe de Garrington, observable en imagerie, correspond à :", "opts": ["Un élargissement symétrique du ligament parodontal", "Un élargissement asymétrique de l'espace ligamentaire", "La destruction de la lamina dura associée", "Une indication d'ankylose dentaire bénigne", "Un indicateur précoce d'infiltration maligne"], "ans": [1, 2, 4]}, {"course": "OPT et TDM", "q": "Sur le plan directionnel dentaire, le terme 'mésial' signifie :", "opts": ["Vers le fond de la bouche", "Vers la ligne médiane de l'arcade", "Du côté de la langue", "La surface de mastication", "La face externe visible"], "ans": [1]}, {"course": "OPT et TDM", "q": "Une lacune située sous le canal mandibulaire, près de l'angle, bien limitée et asymptomatique correspond typiquement à :", "opts": ["Un kyste radiculaire", "Un améloblastome multiloculaire", "La lacune de Stafne (défaut cortical statique)", "Un kératokyste", "Une invagination de la glande sous-maxillaire"], "ans": [2, 4]}, {"course": "OPT et TDM", "q": "Le kyste dentigère (folliculaire) présente les caractéristiques suivantes :", "opts": ["C'est un kyste inflammatoire", "Il entoure la couronne d'une dent incluse", "Son insertion se fait typiquement au collet anatomique de la dent", "Il ne provoque jamais de soufflure corticale", "Il siège souvent au niveau des 3èmes molaires mandibulaires"], "ans": [1, 2, 4]}, {"course": "OPT et TDM", "q": "Quels sont les signes radiologiques du Kératokyste Odontogène (KCO) au scanner ?", "opts": ["Une croissance axiale longitudinale (pousse en longueur)", "Une soufflure vestibulo-linguale massive d'emblée", "Une lacune souvent pluriloculaire en 'bulles de savon'", "Des bords festonnés bien limités par un liseré", "Une continuité corticale maintenue longtemps malgré la taille"], "ans": [0, 3, 4]}, {"course": "OPT et TDM", "q": "L'améloblastome est reconnu radiologiquement par :", "opts": ["Son aspect strictement monogéodique sans expansion", "Sa croissance tridimensionnelle massive et déformante", "Un aspect multiloculaire en 'nid d'abeilles' ou 'bulles de savon'", "Une rhizalyse abrupte des racines dentaires", "La présence de Un abcès dentaire compliqué d'une cellulite au scanner injecté se présentera souvent comme :", "opts": ["Une collection liquidienne centrale (hypodense)", "Une prise de contraste (hyperdense) en anneau de sa coque périphérique", "Un nodule purement osseux (+1000 UH)", "Une infiltration de la graisse sous-cutanée", "Une image strictement identique au tissu musculaire sain"], "ans": [0, 1, 3]}, {"course": "Scanner", "q": "L'équipement de la salle de scanner inclut obligatoirement :", "opts": ["Une cage de Faraday", "Un pupitre de commande protégé par une vitre plombée", "Le statif (gantry)", "La table motorisée", "Des bobines de gradient radiofréquence"], "ans": [1, 2, 3]}, {"course": "Scanner", "q": "Parmi ces pathologies traumatiques, le scanner est l'examen de choix pour :", "opts": ["Les microfêlures de l'émail", "Les fractures complexes du tiers moyen de la face", "L'évaluation du plancher de l'orbite après un choc", "La luxation méniscale de l'ATM", "Les fractures basi-crâniennes associées"], "ans": [1, 2, 4]}, {"course": "Scanner", "q": "Pour un bilan pré-chirurgical implantaire d'un seul édentement, quelle est la recommandation actuelle ?", "opts": ["Le Scanner en première intention", "Le CBCT en première intention car moins irradiant et précis pour l'os", "L'IRM pour vérifier la gencive", "Le panoramique seul suffit toujours", "L'échographie dentaire"], "ans": [1]}, {"course": "Scanner", "q": "Une lésion qui absorbe beaucoup de rayons X au scanner sera codée :", "opts": ["Avec une valeur de Hounsfield négative", "Avec une valeur de Hounsfield très élevée (positive)", "En noir (clarté)", "En blanc (opacité/hyperdensité)", "Comme une collection aérique"], "ans": [1, 3]}];

        // ---------- Fonction d'explication personnalisée pour chaque question ----------
        function generateCustomExplanation(q, selectedIndices, correctIndices) {
            const questionText = q.q;
            const course = q.course;
            const isPerfect = JSON.stringify(selectedIndices.sort()) === JSON.stringify(correctIndices.sort());
            const correctLetters = correctIndices.map(i => String.fromCharCode(65+i)).join(", ");
            const userLetters = selectedIndices.map(i => String.fromCharCode(65+i)).join(", ");
            let explanation = `<div class="explanation-box"><strong>📘 Explication (${course}) :</strong><br>✅ Réponses correctes : ${correctLetters}. 👤 Vos réponses : ${userLetters || "aucune"}.<br>`;

            // Explication spécifique basée sur le contenu de la question
            if (course === "Cone Beam") {
                if (questionText.includes("différence fondamentale") && questionText.includes("faisceau")) {
                    explanation += "🔹 Le CBCT utilise un faisceau conique (en forme de cône) alors que le scanner TDM utilise un faisceau en éventail. C'est la différence clé. Le CBCT ne nécessite qu'une seule rotation, pas plusieurs rotations comme certaines modalités anciennes.";
                }
                else if (questionText.includes("algorithme de reconstruction")) {
                    explanation += "🔹 L'algorithme FDK (Feldkamp-Davis-Kress) est le plus utilisé. Les voxels du CBCT sont isotropes (dimensions égales en x,y,z) ce qui permet des reconstructions multiplanaires sans déformation. Le logiciel permet la navigation dans les trois plans orthogonaux (axial, coronal, sagittal).";
                }
                else if (questionText.includes("éléments constitutifs")) {
                    explanation += "🔹 Un CBCT comprend un bras en C (C-arm), un détecteur plan bidimensionnel, un panneau de contrôle pour choisir le FOV. Le tube émet un faisceau conique, pas en éventail. Une carte graphique performante est nécessaire pour la reconstruction.";
                }
                else if (questionText.includes("rotation de l'appareil")) {
                    explanation += "🔹 La rotation dure généralement entre 5 et 40 secondes, avec une moyenne de 6 à 30 secondes. Les durées plus courtes ou plus longues sont exceptionnelles.";
                }
                else if (questionText.includes("nombre de projections")) {
                    explanation += "🔹 Le nombre de projections varie de 180 à plus de 1024. Un nombre élevé améliore la résolution et réduit les artefacts, mais augmente le temps d'examen et la dose. Il ne diminue pas la résolution, bien au contraire.";
                }
                else if (questionText.includes("endodontie")) {
                    explanation += "🔹 En endodontie, le CBCT est indiqué en petit champ (FOV réduit) uniquement si les radiographies conventionnelles sont insuffisantes : canaux oblitérés, résorptions, traumatismes. Jamais en première intention pour caries ou tumeurs malignes.";
                }
                else if (questionText.includes("dent de sagesse") || questionText.includes("extraction dentaire")) {
                    explanation += "🔹 Le CBCT est prescrit en cas de superposition apex/canal mandibulaire sur le panoramique, ou de crochet apical suspecté, ou d'inclusion haute / mésioversion au maxillaire. Pas en cas d'indépendance certaine ou d'inclusion sans risque.";
                }
                else if (questionText.includes("orthodontie") && questionText.includes("petit champ")) {
                    explanation += "🔹 En orthodontie, le petit champ haute résolution (voxels ≤125 µm) est utile pour : ankylose dentaire, hypercémentose débutante, résorption externe liée à une dent incluse. L'analyse pour chirurgie orthognathique nécessite un grand champ basse résolution.";
                }
                else if (questionText.includes("sinus") && questionText.includes("ATM")) {
                    explanation += "🔹 Le CBCT est une alternative à la TDM pour la rhinosinusite chronique, détecte l'arthrose condylienne et les condensations osseuses, mais n'est pas recommandé pour les infections fongiques ou les tissus mous de l'ATM (IRM est préférée).";
                }
                else if (questionText.includes("inconvénients")) {
                    explanation += "🔹 Les inconvénients majeurs du CBCT : faible résolution de contraste pour les tissus mous, incapacité d'explorer les pathologies tumorales infiltrantes. Les densités ne sont pas des UH absolues, et la résolution spatiale est meilleure que la TDM pour l'os, pas inférieure.";
                }
                else if (questionText.includes("artefacts cinétiques")) {
                    explanation += "🔹 Les artefacts cinétiques sont dus au mouvement du patient (déglutition, tête). Ils provoquent un flou et un dédoublement des structures. Les bandes noires/blanches et les stries sont plutôt liés aux métaux.";
                }
                else if (questionText.includes("durcissement du faisceau") || questionText.includes("beam hardening")) {
                    explanation += "🔹 L'artefact de durcissement est dû à l'atténuation différentielle des rayons X, créant des zones hyperdenses artificielles près des structures denses (émail, métal). Ce n'est ni un flou ni des stries directes.";
                }
                else if (questionText.includes("En comparaison avec le scanner conventionnel")) {
                    explanation += "🔹 Le CBCT est moins cher (3 à 5 fois), plus léger, compact, s'installe en cabinet dentaire sans renforcement du plancher. Il n'a pas besoin de froid particulier et ses pixels sont plus petits (meilleure résolution spatiale).";
                }
                else if (questionText.includes("préparation et l'installation")) {
                    explanation += "🔹 La préparation inclut le retrait des objets métalliques, l'utilisation d'une mentonnière et appui-tête, et la réalisation d'un topogramme (scout view) pour le centrage. La position peut être debout ou assise, pas obligatoirement allongée. Pas d'injection systématique.";
                }
                else if (questionText.includes("algorithme de reconstruction gère")) {
                    explanation += "🔹 L'algorithme effectue une rétroprojection filtrée, reconstruit un volume 3D, et encode en format DICOM. Il utilise une carte graphique haute performance. Les voxels isotropes ne sont pas transformés en pixels anisotropes.";
                }
                else if (questionText.includes("dose d'exposition et la résolution spatiale")) {
                    explanation += "🔹 La dose et la résolution dépendent du FOV (plus petit FOV = meilleure résolution et dose plus faible), du nombre de projections, et des paramètres kV/mA. Le temps d'apnée du patient n'influence pas ces paramètres.";
                }
                else if (questionText.includes("implantologie")) {
                    explanation += "🔹 En implantologie, le CBCT permet la visualisation optimale des volumes osseux, l'appréciation de la qualité de l'os spongieux, et l'évaluation précise des rapports anatomiques. Les UH ne sont pas absolues, mais la classification de Lekholm et Zarb est utilisée.";
                }
                else if (questionText.includes("invention du CBCT dentaire")) {
                    explanation += "🔹 Le CBCT dentaire a été inventé en 1997 par Arai sous le nom d'Ortho-CT. Hounsfield a inventé le scanner TDM en 1972. Bloch et Purcell ont découvert la RMN.";
                }
                else if (questionText.includes("champ moyen") && questionText.includes("orthodontie")) {
                    explanation += "🔹 Pour un champ moyen ou petit en orthodontie, les indications sont : inclusions dentaires et kystes associés, anomalies de nombre, fentes palatines. L'analyse globale pour chirurgie orthognathique nécessite un grand champ.";
                }
                else if (questionText.includes("valeurs de densité en CBCT")) {
                    explanation += "🔹 Les valeurs de densité en CBCT sont codées sur 12 ou 14 bits en niveaux de gris, relatives et dépendantes du FOV et des artefacts. Elles ne sont pas des UH absolues et ne permettent pas une analyse quantitative précise comme la TDM.";
                }
                else if (questionText.includes("artefacts .* amalgames") || (questionText.includes("artefacts") && questionText.includes("implants"))) {
                    explanation += "🔹 Les artefacts métalliques (amalgames, implants) provoquent des stries, des bandes noires et blanches, et un durcissement du faisceau périphérique. Les artefacts de mouvement sont différents (flou, dédoublement).";
                }
                else if (questionText.includes("capteur d'un CBCT")) {
                    explanation += "🔹 Le capteur est un détecteur bidimensionnel à écran plat, situé en face du tube, qui intercepte le faisceau conique après traversée du patient. Il transforme l'analogique en numérique. Il n'est pas du même côté que le tube.";
                }
                else if (questionText.includes("topogramme") || questionText.includes("scout view")) {
                    explanation += "🔹 Le topogramme (scout view) sert à centrer précisément l'examen et à définir la zone exacte d'exploration (FOV). Il ne sert pas à détecter les caries ni à visualiser les tissus mous.";
                }
                else if (questionText.includes("caractéristiques des voxels")) {
                    explanation += "🔹 En CBCT, les voxels sont isotropes (dimensions x,y,z identiques), ce qui permet des reconstructions multiplanaires sans déformation. Ils ne sont pas anisotropes. L'isotropie n'empêche pas la reconstruction curviligne.";
                }
                else if (questionText.includes("caries dentaires au CBCT")) {
                    explanation += "🔹 Les radiographies bite-wing restent supérieures pour les caries. Le CBCT n'est pas un examen de dépistage, mais si une carrie est découverte fortuitement, elle doit être signalée. Il ne remplace pas le bite-wing.";
                }
                else if (questionText.includes("petit champ (FOV)")) {
                    explanation += "🔹 Un petit champ (FOV) augmente la résolution spatiale et diminue la dose d'irradiation pour le patient. L'inverse est vrai pour un grand champ.";
                }
                else if (questionText.includes("lésions kystiques")) {
                    explanation += "🔹 Le CBCT permet d'identifier les kystes odontogènes de grande taille, les tumeurs bénignes calcifiées, et montre l'extension osseuse. Mais il ne différencie pas le contenu liquidien d'un tissu malin, et n'est pas indiqué pour suspicion de malignité (faible contraste des tissus mous).";
                }
                else if (questionText.includes("comporte le faisceau de rayons X")) {
                    explanation += "🔹 Le faisceau en CBCT est continu ou pulsé, il couvre tout l'organe en une seule rotation complète, et diverge en forme de cône depuis le tube. Il n'irradie pas uniquement une coupe, et le lit du patient ne bouge pas (rotation seule).";
                }
                else if (questionText.includes("bilan d'une dent de sagesse mandibulaire")) {
                    explanation += "🔹 Le praticien évalue la morphologie radiculaire, les rapports avec la 2ème molaire, et l'intégrité de la corticale du canal mandibulaire. L'épaisseur de la gencive et le flux sanguin ne sont pas visibles en CBCT.";
                }
                else if (questionText.includes("volume reconstruit")) {
                    explanation += "🔹 Le volume permet de générer des coupes axiales, coronales, sagittales, des courbes curvilignes (panoramiques reconstruites) et des reconstructions orthogonales à la crête. Toutes ces options sont correctes.";
                }
                else {
                    explanation += "🔹 D'après le cours CBCT : faisceau conique, reconstruction FDK, voxels isotropes, faible résolution des tissus mous, dose variable selon FOV et projections, artefacts cinétiques ou métalliques. Les indications précises dépendent du contexte clinique.";
                }
            }
            else if (course === "OPT et TDM") {
                if (questionText.includes("principe de l'orthopantomogramme")) {
                    explanation += "🔹 L'OPT repose sur la tomographie rotative à faisceau étroit. Un axe focal net permet de voir les structures nettes, et le flou de balayage élimine les structures hors-foyer. Ce n'est pas un faisceau conique ni une acquisition 3D native.";
                }
                else if (questionText.includes("critères de qualité d'un OPT")) {
                    explanation += "🔹 Les critères de qualité : visibilité des deux condyles, palais dur au-dessus des apex maxillaires, absence d'artefacts métalliques, bande radioclaire sombre sur les apex si la langue est bien placée (sinon bande claire parasite). L'asymétrie est un défaut.";
                }
                else if (questionText.includes("n'applique pas sa langue")) {
                    explanation += "🔹 Si la langue n'est pas plaquée, une bande radioclaire d'air pharyngé barre les apex maxillaires, simulant de fausses lésions de lyse apicale. Une bande radio-opaque n'apparaît pas, et le contraste n'est pas amélioré.";
                }
                else if (questionText.includes("image fantôme")) {
                    explanation += "🔹 L'image fantôme est générée par un objet dense hors du plan focal, projetée du côté opposé, surélevée et floue. Elle ne provient pas d'un objet de faible densité et n'est pas nette.";
                }
                else if (questionText.includes("balayage de la région mandibulaire")) {
                    explanation += "🔹 Le balayage mandibulaire évalue : bord antérieur et postérieur de la branche montante, foramen mentonnier, échancrure sigmoïde et coroné. Les apophyses styloïdes et la suture inter-maxillaire sont vues ailleurs.";
                }
                else if (questionText.includes("fenêtre osseuse")) {
                    explanation += "🔹 La fenêtre osseuse analyse la trame trabéculaire, la continuité des corticales, et les structures dentaires minéralisées. La graisse infra-temporale et les muscles sont vus en fenêtre parenchymateuse.";
                }
                else if (questionText.includes("classification de Lodwick")) {
                    explanation += "🔹 Lodwick type I (géographique) : IA = liseré ostéosclérose (lent), IB = contours nets sans liseré (intermédiaire), IC = contours mal visibles (agressif). La lésion perméative est type III.";
                }
                else if (questionText.includes("processus pathologique malin infiltrant")) {

                if (selectedSet.has(i) && correctAnsArray.includes(i)) sum += weight;
                else if (selectedSet.has(i) && !correctAnsArray.includes(i)) sum -= weight;
            }
            return Math.max(0, sum);
        }

        function loadQuestion() {
            const q = questionsData[currentIdx];
            document.getElementById('current-q-num').innerText = currentIdx + 1;
            document.getElementById('q-counter').innerText = currentIdx + 1;
            document.getElementById('course-badge').innerText = q.course;
            const prog = ((currentIdx) / questionsData.length) * 100;
            document.getElementById('progress-bar').style.width = prog + '%';
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D', 'E'];
            const stored = userAnswers[currentIdx];
            const isAnsweredStored = stored.isAnswered;
            q.opts.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'opt-btn w-full p-4 bg-gray-50 text-gray-700 rounded-xl cursor-pointer flex items-center font-medium shadow-sm';
                btn.innerHTML = `<span class="w-8 h-8 flex items-center justify-center bg-white rounded-lg shadow text-blue-600 font-bold mr-4">${letters[index]}</span> <span class="flex-1">${opt}</span>`;
                if (reviewMode || isAnsweredStored) {
                    btn.style.cursor = 'default';
                    if (stored.selected.includes(index)) {
                        if (q.ans.includes(index)) btn.classList.add('opt-correct');
                        else btn.classList.add('opt-wrong');
                    } else if (q.ans.includes(index)) btn.classList.add('opt-missed');
                } else {
                    btn.onclick = () => toggleOption(index, btn);
                    if (selectedOptions.has(index)) btn.classList.add('opt-selected');
                }
                container.appendChild(btn);
            });
            if (reviewMode || isAnsweredStored) {
                document.getElementById('validate-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('back-btn').disabled = false;
                const explanationDiv = document.getElementById('explanation-container');
                if (stored.explanation) {
                    explanationDiv.innerHTML = stored.explanation;
                    explanationDiv.classList.remove('hidden');
                } else {
                    explanationDiv.classList.add('hidden');
                }
                const fb = document.getElementById('feedback-msg');
                fb.style.opacity = '0';
            } else {
                document.getElementById('validate-btn').classList.remove('hidden');
                document.getElementById('validate-btn').disabled = selectedOptions.size === 0;
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('explanation-container').classList.add('hidden');
                const fb = document.getElementById('feedback-msg');
                fb.style.opacity = '0';
            }
            document.getElementById('back-btn').disabled = (currentIdx === 0 && !reviewMode);
        }

        function toggleOption(index, element) {
            if (reviewMode || userAnswers[currentIdx].isAnswered) return;
            if (selectedOptions.has(index)) {
                selectedOptions.delete(index);
                element.classList.remove('opt-selected');
            } else {
                selectedOptions.add(index);
                element.classList.add('opt-selected');
            }
            document.getElementById('validate-btn').disabled = selectedOptions.size === 0;
        }

        function validateAnswer() {
            if (selectedOptions.size === 0 || reviewMode || userAnswers[currentIdx].isAnswered) return;
            const q = questionsData[currentIdx];
            const points = computeQuestionPoints(selectedOptions, q.ans);
            totalPoints += points;
            stats[q.course].points += points;
            const explanation = generateCustomExplanation(q, Array.from(selectedOptions), q.ans);
            userAnswers[currentIdx] = { selected: Array.from(selectedOptions), points: points, isAnswered: true, explanation: explanation };
            const container = document.getElementById('options-container');
            const btns = container.children;
            for (let i = 0; i < btns.length; i++) {
                const btn = btns[i];
                btn.classList.remove('opt-selected');
                const isCorrect = q.ans.includes(i);
                const isSelected = selectedOptions.has(i);
                if (isCorrect && isSelected) btn.classList.add('opt-correct');
                else if (!isCorrect && isSelected) btn.classList.add('opt-wrong');
                else if (isCorrect && !isSelected) btn.classList.add('opt-missed');
                else btn.style.opacity = '0.5';
                btn.onclick = null;
            }
            const expDiv = document.getElementById('explanation-container');
            expDiv.innerHTML = explanation;
            expDiv.classList.remove('hidden');
            const fb = document.getElementById('feedback-msg');
            fb.innerHTML = `✓ Points obtenus : ${points.toFixed(2)} / 1.00`;
            fb.classList.add('text-green-600');
            fb.style.opacity = '1';
            document.getElementById('validate-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx + 1 < questionsData.length) {
                currentIdx++;
                if (!reviewMode && !userAnswers[currentIdx].isAnswered) { selectedOptions.clear(); isAnswered = false; }
                else if (!reviewMode && userAnswers[currentIdx].isAnswered) { selectedOptions.clear(); }
                loadQuestion();
            } else if (!reviewMode) { showResults(); }
            else if (reviewMode && currentIdx + 1 < questionsData.length) { currentIdx++; loadQuestion(); }
        }

        function previousQuestion() {
            if (currentIdx > 0) { currentIdx--; if (!reviewMode && !userAnswers[currentIdx].isAnswered) selectedOptions.clear(); loadQuestion(); }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const noteSur20 = ((totalPoints / 120) * 20).toFixed(2);
            document.getElementById('final-score-20').innerText = noteSur20;
            document.getElementById('final-stats-text').innerHTML = `Tu as obtenu ${totalPoints.toFixed(2)} points sur 120.`;
            const tbody = document.getElementById('stats-table-body');
            tbody.innerHTML = '';
            for (const [course, data] of Object.entries(stats)) {
                const pct = Math.round((data.points / data.total) * 100);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="px-6 py-4 text-sm font-medium text-gray-900">${course}</td><td class="px-6 py-4 text-sm text-center text-gray-500">${data.points.toFixed(1)} / ${data.total}</td><td class="px-6 py-4 text-right"><div class="flex items-center justify-end"><span class="text-sm font-medium ${pct>=50?'text-green-600':'text-red-600'} mr-2">${pct}%</span><div class="w-16 bg-gray-200 rounded-full h-1.5"><div class="${pct>=50?'bg-green-500':'bg-red-500'} h-1.5 rounded-full" style="width: ${pct}%"></div></div></div></td>`;
                tbody.appendChild(tr);
            }
        }

        function startReviewAll() {
            reviewMode = true;
            currentIdx = 0;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
            if (!document.getElementById('exit-review-btn')) {
                const exitBtn = document.createElement('button');
                exitBtn.id = "exit-review-btn";
                exitBtn.innerText = "❌ Quitter la révision";
                exitBtn.className = "ml-3 px-4 py-2 bg-red-500 text-white rounded-lg text-sm";
                exitBtn.onclick = () => { reviewMode = false; showResults(); };
                const headerDiv = document.querySelector('#quiz-screen .flex.justify-between.items-center:first-child');
                headerDiv.appendChild(exitBtn);
            }
        }

        function openStatsModal() {
            const modal = document.getElementById('stats-modal');
            const modalBody = document.getElementById('modal-stats-body');
            modalBody.innerHTML = '';
            for (const [course, data] of Object.entries(stats)) {
                const pct = Math.round((data.points / data.total) * 100);
                const row = document.createElement('tr');
                row.innerHTML = `<td class="px-4 py-2 text-sm font-medium text-gray-900">${course}</td><td class="px-4 py-2 text-sm text-center text-gray-600">${data.points.toFixed(1)} / ${data.total}</td><td class="px-4 py-2 text-sm text-right font-semibold ${pct>=50?'text-green-600':'text-red-600'}">${pct}%</td>`;
                modalBody.appendChild(row);
            }
            document.getElementById('modal-total-points').innerText = totalPoints.toFixed(2);
            document.getElementById('modal-provisional-note').innerText = ((totalPoints/120)*20).toFixed(2);
            modal.classList.remove('hidden');
        }

        function closeStatsModal() { document.getElementById('stats-modal').classList.add('hidden'); }

        window.validateAnswer = validateAnswer;
        window.nextQuestion = nextQuestion;
        window.previousQuestion = previousQuestion;
        window.openStatsModal = openStatsModal;
        window.closeStatsModal = closeStatsModal;
        window.startReviewAll = startReviewAll;

        loadQuestion();
    </script>
</body>
</html>
