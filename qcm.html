<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCMs — Endodontie</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #0B0F19;
  --bg-card: #151D30;
  --bg-input: #1F2A45;
  --border-color: #2E3C60;
  --text-primary: #F3F4F6;
  --text-secondary: #9CA3AF;
  --accent-cyan: #00F0FF;
  --accent-blue: #3B82F6;
  --color-success: #10B981;
  --color-error: #EF4444;
  --color-warning: #F59E0B;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background-color: var(--bg-main);
  color: var(--text-primary);
  line-height: 1.5;
  padding: 2rem 1rem;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

.header {
  background: linear-gradient(135deg, var(--bg-card) 0%, #1A2642 100%);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.header h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, #FFF 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.score-bar {
  display: flex;
  gap: 0.75rem;
}

.score-chip {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  background: var(--bg-input);
}

.course-tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  overflow-x: auto;
  padding-bottom: 4px;
}

.course-tabs::-webkit-scrollbar {
  height: 4px;
}

.course-tabs::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 2px;
}

.tab {
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all 0.2s ease;
}

.tab.active {
  background: var(--accent-blue);
  color: #FFF;
  border-color: var(--accent-blue);
  box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
}

.tab:hover:not(.active) {
  background: var(--bg-input);
  color: var(--text-primary);
}

.filter-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}

.filter-btn.active {
  background: var(--bg-input);
  color: var(--accent-cyan);
  border-color: var(--accent-cyan);
}

.progress-info {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  display: flex;
  justify-content: space-between;
}

.qcard {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 1.75rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  transition: transform 0.2s ease;
}

.qnum {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent-cyan);
  margin-bottom: 0.75rem;
  font-weight: 700;
}

.qtext {
  font-size: 16px;
  color: var(--text-primary);
  line-height: 1.6;
  margin-bottom: 1.5rem;
  font-weight: 500;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.opt {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border-color);
  cursor: pointer;
  background: var(--bg-input);
  transition: all 0.2s ease;
}

.opt:hover:not(.disabled) {
  border-color: var(--accent-blue);
  background: #253354;
}

.opt.selected {
  border-color: var(--accent-blue);
  background: rgba(59, 130, 246, 0.15);
}

.opt.correct {
  border-color: var(--color-success);
  background: rgba(16, 185, 129, 0.15);
}

.opt.wrong {
  border-color: var(--color-error);
  background: rgba(239, 68, 68, 0.15);
}

.opt.missed {
  border-color: var(--color-warning);
  background: rgba(245, 158, 11, 0.11);
}

.opt-letter {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
  background: var(--bg-card);
}

.opt.selected .opt-letter {
  background: var(--accent-blue);
  color: #FFF;
  border-color: var(--accent-blue);
}

.opt.correct .opt-letter {
  background: var(--color-success);
  color: #FFF;
  border-color: var(--color-success);
}

.opt.wrong .opt-letter {
  background: var(--color-error);
  color: #FFF;
  border-color: var(--color-error);
}

.opt.missed .opt-letter {
  background: var(--color-warning);
  color: #FFF;
  border-color: var(--color-warning);
}

.opt-text {
  font-size: 14px;
  color: var(--text-primary);
}

.check-btn {
  margin-top: 1.5rem;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, var(--accent-blue) 0%, #1D4ED8 100%);
  color: #FFF;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.check-btn:hover:not(:disabled) {
  filter: brightness(1.1);
  box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
}

.check-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
}

.explanation {
  margin-top: 1.25rem;
  padding: 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.6;
}

.explanation.success {
  background: rgba(16, 185, 129, 0.1);
  color: #34D399;
  border-left: 4px solid var(--color-success);
}

.explanation.partial {
  background: rgba(245, 158, 11, 0.1);
  color: #FBBF24;
  border-left: 4px solid var(--color-warning);
}

.explanation.fail {
  background: rgba(239, 68, 68, 0.1);
  color: #F87171;
  border-left: 4px solid var(--color-error);
}

.nav-row {
  display: flex;
  gap: 0.75rem;
  justify-content: space-between;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
}

.nav-btn:hover:not(:disabled) {
  background: var(--bg-input);
  border-color: var(--text-secondary);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.reset-btn {
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid rgba(239, 68, 68, 0.3);
  background: transparent;
  color: var(--color-error);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.reset-btn:hover {
  background: rgba(239, 68, 68, 0.1);
}

.dashboard-card {
  background: linear-gradient(135deg, #16223F 0%, var(--bg-card) 100%);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 2rem;
  margin-top: 2rem;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.dashboard-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 1.5rem;
  color: #FFF;
  text-align: center;
  letter-spacing: -0.5px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat-box {
  background: var(--bg-main);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}

.stat-val {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-cyan);
  margin-bottom: 0.25rem;
}

.stat-lbl {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.table-wrapper {
  overflow-x: auto;
}

.dashboard-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0.5rem;
  font-size: 14px;
}

.dashboard-table th, .dashboard-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.dashboard-table th {
  color: var(--text-secondary);
  font-weight: 600;
}

.dashboard-table td {
  color: var(--text-primary);
}

.progress-track {
  background: var(--bg-main);
  border-radius: 6px;
  height: 8px;
  width: 100px;
  display: inline-block;
  overflow: hidden;
  vertical-align: middle;
  margin-right: 8px;
}

.progress-fill {
  background: var(--accent-blue);
  height: 100%;
  width: 0;
}

.disabled {
  cursor: default !important;
}

@media(max-width: 480px) {
  .header { display: flex; flex-direction: column; align-items: flex-start; }
  .score-bar { width: 100%; justify-content: space-between; }
  .nav-row { flex-direction: column; gap: 0.5rem; }
  .nav-btn, .reset-btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>QCMs — Endodontie</h2>
    <div class="score-bar">
      <div class="score-chip" id="score-display">Score : 0 / 0</div>
      <div class="score-chip" id="progress-display">Répondues : 0 / 80</div>
    </div>
  </div>
  <div class="course-tabs" id="course-tabs"></div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all')">Toutes</button>
    <button class="filter-btn" onclick="setFilter('unanswered')">Non répondues</button>
    <button class="filter-btn" onclick="setFilter('wrong')">Erreurs</button>
    <button class="filter-btn" onclick="setFilter('correct')">Correctes</button>
  </div>
  <div class="progress-info" id="progress-info"></div>
  <div id="qlist"></div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Précédent</button>
    <button class="reset-btn" onclick="resetCourse()">Réinitialiser</button>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">Suivant →</button>
  </div>
  <div id="dashboard-zone"></div>
</div>

<script>
const COURSES = [
  {id:0, name:"Cavité d'accès", short:"Cavité d'accès"},
  {id:1, name:"Techniques d'obturation", short:"Techniques d'obturation"},
  {id:2, name:"Thérapeutique des pulpites", short:"Thérapeutique des pulpites"},
  {id:3, name:"Instrumentation endo", short:"Instrumentation endo"}
];

const ALL_QUESTIONS = [
{course:0,q:"Concernant les objectifs de la cavité d'accès endodontique (CAE), quelles propositions sont exactes ?",opts:["Elle doit permettre un passage direct à l'orifice des canaux","Elle doit obligatoirement être réalisée avec spray pour éviter la surchauffe","Les entrées canalaires doivent être visibles directement sans déplacer le miroir","Elle doit être réalisée à minima pour économiser le tissu dentaire","La mise en dépouille des parois est inutile si la chambre est propre"],correct:[0,2,3]},
{course:0,q:"Lors de la réalisation de la cavité de délinéation, quel instrument est utilisé en première intention ?",opts:["Fraise boule longue n°2 montée sur contre-angle","Fraise 170L ou surtaillée montée sur turbine","Fraise Zekrya Endo à pointe mousse","Fraise de BATT montée sur contre-angle lent","Fraise LN de Maillefer"],correct:[1]},
{course:0,q:"Pour la suppression du plafond pulpaire, quelles affirmations sont correctes ?",opts:["La fraise est utilisée exclusivement en poussée apicale","On utilise une fraise boule long col de diamètre 012 ou 014 sans spray","La sonde n°17 vérifie la suppression complète du plafond","La fraise est montée sur contre-angle bleu","La fraise Endo Z peut remplacer la fraise boule long col pour cette étape"],correct:[1,2,3,4]},
{course:0,q:"Pour la molaire maxillaire, lesquelles des propositions suivantes sont exactes ?",opts:["La cavité d'accès est de forme triangulaire","La 1ère molaire maxillaire presents très fréquemment 4 canaux","Le canal MV2 est recherché avant les 3 canaux principaux","La cavité est en mésial de la face occlusale et ne dépasse pas le pont d'émail","Le canal palatin est le plus large et justifie la forme trapézoïdale de la cavité"],correct:[1,3,4]},
{course:0,q:"Concernant l'incisive centrale maxillaire, quelles propositions sont exactes ?",opts:["La cavité d'accès est réalisée sur la face vestibulaire","La forme de la cavité est triangulaire à sommet au niveau du cingulum","Le triangle dentinaire palatin doit être supprimé","L'approfondissement se fait selon l'axe de la couronne comme pour les dents cuspidées","Le canal a une section triangulaire qui devient circulaire en apical"],correct:[1,2,4]},
{course:0,q:"Pour la 1ère prémolaire mandibulaire, quelles affirmations sont correctes ?",opts:["Elle présente toujours un seul canal","La cavité d'accès ovalaire est réalisée aux dépens de la cuspide vestibulaire","L'approfondissement se fait selon le grand axe de la dent confondu avec celui de la couronne","La chambre pulpaire est au milieu de la dent","La partie vestibulaire représente environ les 2/3 de la face occlusale"],correct:[1,3,4]},
{course:0,q:"Concernant la localisation du canal MV2 de la 1ère molaire maxillaire, quelles techniques sont valides ?",opts:["Utilisation du bleu de méthylène pour colorer les zones avec tissu pulpaire","L'hypochlorite produit des bulles au niveau des canaux non traités contenant du tissu","Sondage parodontal évaluant la position de la furcation MV-P","Radiographie en incidence disto-excentrée (Walton)","Le MV2 est visible dès l'ouverture de la CAE sans recherche particulière"],correct:[0,1,2,3]},
{course:0,q:"Les accidents lors de la préparation de la CAE comprennent, lesquels ?",opts:["La perforation vestibulaire due à une erreur d'axe","La perforation du plancher pulpaire de pronostic défavorable aux molaires maxillaires","L'ouverture insuffisante qui facilite le nettoyage pulpaire","La perforation desmodontale consécutive à une fausse route","L'élargissement excessif qui est toujours bénéfique pour l'accès canalaire"],correct:[0,1,3]},
{course:0,q:"Concernant la notion d'axe lors de l'approfondissement de la cavité, lesquelles sont exactes ?",opts:["L'axe de la couronne est toujours confondu avec l'axe de la racine","Pour les prémolaires mandibulaires l'axe couronne est orienté occlusio-lingual","Pour les molaires mandibulaires, l'inclinaison linguale de la couronne ne doit pas être négligée","La diminution du volume pulpaire modifie l'axe de la CAE sur les dents antérieures","Une version mésiale de la dent oblige à adapter l'axe d'approfondissement"],correct:[1,2,3,4]},
{course:0,q:"Pour les incisives mandibulaires, quelles propositions sont exactes ?",opts:["Les incisives mandibulaires présentent deux canaux dans 100% des cas","Elles sont les plus petites dents de la cavité buccale de l'adulte","La cavité est réalisée sur la face linguale avec une forme triangulaire","Les racines sont fines et aplaties dans le sens mésio-distal","La perforation iatrogène la plus fréquente est en lingual"],correct:[1,2,3]},
{course:0,q:"Concernant la finition de la cavité d'accès, quelles affirmations sont exactes ?",opts:["Une occluso-divergence de 2 à 3 degrés améliore l'étanchéité du pansement","Les parois doivent être lisses sans aspérités","Si les points de référence coronaires ne sont pas fiables, les pointes cuspidiennes sont réduites d'environ 1 mm","La cavité doit permettre de voir toutes les entrées canalaires sans bouger le miroir","Les stops en silicone des instruments sont positionnés en regard du bord incisif"],correct:[0,1,2,3]},
{course:0,q:"Pour la 1ère molaire mandibulaire, lesquelles des propositions sont exactes ?",opts:["Elle présente systématiquement 3 canaux, jamais 4","La racine mésiale présente une courbure distale","La zone neutre est délimitée par les sillons intercuspidiens vestibulaire et lingual","La cavité est de forme trapézoïdale située sur la partie mésiale","L'axe couronne et l'axe radiculaire sont confondus en vue proximale"],correct:[1,2,3]},
{course:0,q:"Lors des étapes préliminaires à la CAE (préambule), lesquelles sont correctes ?",opts:["Si la dent est trop délabrée, la restauration provisoire est faite avant la pose de la digue","Le curetage de carie se fait à la fraise boule n°6 ou 8 sur contre-angle à vitesse lente","Les parois d'émail fragiles doivent être conservées pour maintenir le crampon","Si la dent porte une couronne défectueuse, elle est déposée lors de cette étape","La mise en place de la digue se fait toujours avant toute intervention sur la dent délabrée"],correct:[0,1,3]},
{course:0,q:"Concernant la fraise Zekrya Endo, quelles propositions sont exactes ?",opts:["Elle est utilisée à la turbine en prenant appui sur le plancher pulpaire","Sa pointe active permet de fraiser en poussée sans risque de perforation","Sa longueur permet de donner la forme définitive aux parois de la CAE","Elle est montée sur contre-angle lent uniquement","Elle présente une pointe mousse pour travailler sans perforation"],correct:[0,2,4]},
{course:0,q:"Pour le groupe incisivo-canin maxillaire, quelles affirmations sont correctes ?",opts:["La canine a une cavité ovalaire contrairement aux incisives","L'incisive latérale présente quasi-constamment une courbure apicale en distopalatin","L'approfondissement se fait dans l'axe de la couronne comme pour les prémolaires","Le triangle palatin est supprimé avec la fraise boule LN insérée à l'arrêt puis utilisée en retrait","La cavité doit toucher légèrement le bord incisif pour une meilleure accessibilité"],correct:[0,1,3]},
{course:0,q:"Concernant le repérage des cornes pulpaires de la molaire maxillaire, lesquelles sont exactes ?",opts:["La corne MV est placée à l'intersection du sillon intercuspidien vestibulaire et du sillon principal","La corne palatine est juste sous la cuspide du même nom","Le MV2 se trouve en mésial de l'axe P-MV1 dans un triangle formé par la hauteur","Le canal palatin est plus étroit que le canal MV, ce qui explique la forme triangulaire","La cavité finale est légèrement trapézoïdale permettant l'accès aux 4 canaux sans interférence"],correct:[0,2,4]},
{course:0,q:"Pour les 2ème et 3ème molaires mandibulaires, lesquelles sont exactes ?",opts:["Les repères sont identiques à ceux de la 1ère molaire","La 2ème molaire possède toujours 4 cuspides","Plus la dent est distale, plus les canaux mésiaux ont tendance à fusionner","La forme trapézoïdale de la cavité est accentuée pour les dents distales","La forme de la cavité tend vers le rectangle quand les canaux mésiaux se rapprochent"],correct:[0,1,2,4]},
{course:0,q:"Concernant les obstacles à la préparation de la CAE, lesquelles sont exactes ?",opts:["Les calcifications intra-pulpaires peuvent oblitérer totalement la chambre chez les sujets âgés","En cas de calcification, les ultrasons permettent de désolidariser le pulpolithe","La fraise LN peut fraiser en direction des orifices si les ultrasons sont inefficaces","La présence d'un pivot contre-indique définitivement tout retraitement","Des clichés radiographiques fréquents sont nécessaires lors du fraisage des calcifications"],correct:[0,1,2,4]},
{course:0,q:"Pour le cathétérisme canalaire après la CAE, quelles affirmations sont correctes ?",opts:["On introduit une lime K ou MMC n°8, 10 ou 15 selon le diamètre du canal","Le cathétérisme vérifie l'axe du canal et l'absence d'interférence avec les parois de la CAE","Si une interférence persiste, la fraise Zekrya est utilisée pour rectifier en forçant","Le cathétérisme confirme que le traitement endodontique peut être entrepris","On peut utiliser une sonde de Rhein pour vérifier l'orientation des canaux"],correct:[0,1,3,4]},
{course:0,q:"Concernant la perforation du plancher pulpaire, lesquelles des propositions sont exactes ?",opts:["Le pronostic est plus favorable aux molaires maxillaires","À la mandibule, une séparation de racine peut être envisagée","L'obturation peut être tentée après arrêt de l'hémorragie","Elle peut conduire à une lésion de furcation","Elle est facilement évitée par une orientation précise de la fraise selon les principes de la CAE"],correct:[1,2,3,4]},
{course:1,q:"Selon WEINE (1977), l'obturation canalaire est définie comme :",opts:["La 1ère étape du traitement endodontique après le diagnostic","Le scellement de toute la cavité endodontique isolant le système canalaire du milieu buccal et du parodonte profond","L'élimination chimique des bactéries résiduelles par irrigation","La condensation latérale de gutta-percha autour d'un maître cône","Le remplissage partiel du canal principal uniquement"],correct:[1]},
{course:1,q:"Les conditions techniques préalables au scellement canalaire comprennent lesquelles ?",opts:["Asymptomatologie de la dent","Présence d'une légère exsudation intra-canalaire témoignant de la vitalité tissulaire","Cultures intra-canalaires négatives","Absence d'exsudation intra-canalaire","Radiographie de contrôle post-opératoire déjà réalisée"],correct:[0,2,3]},

{course:3,q:"La réglette endodontique (endomètre de Maillefer) et les stops en silicone servent à :",opts:["Ajuster les stops en silicone directement sur l'instrument","Matérialiser la longueur de travail calculée préalablement","Vérifier la conicité des instruments utilisés","Les stops mesurent 1.5 à 2.5mm de largeur et sont perforés au milieu","Certains instruments intègrent le stop directement sur leur corps"],correct:[0,1,3,4]},
{course:3,q:"Concernant les accessoires endodontiques, lesquelles sont exactes ?",opts:["L'éponge de transfert contient une solution d'hypochlorite assurant la décontamination des instruments","L'éponge est stérilisable à 200°C","Les boîtes endodontiques en aluminium peuvent être stérilisées à l'autoclave","L'éponge utilise des disques de mousse à usage unique","Les boîtes endodontiques résistent à la désinfection chimique"],correct:[0,1,2,3,4]},
{course:3,q:"Concernant la description d'un instrument endodontique normalisé, lesquelles sont exactes ?",opts:["Le diamètre de la pointe D1 exprimé en 100ème de mm donne le numéro de l'instrument","Tous les instruments endodontiques présentent une lame active de 16mm","La conicité ISO est de 2%","D2 = D1 + 0.32mm quelle que soit la conicité de l'instrument","Du n°60 au n°140 l'augmentation de diamètre se fait par 5/100mm"],correct:[0,1,2,3]},
{course:3,q:"Concernant les instruments d'accès à la chambre pulpaire, lesquelles sont exactes ?",opts:["La fraise Zekrya Endo permet un accès sécurisé sans risque de perforation grâce à sa pointe mousse","La fraise Endo Access est également utilisée pour l'accès à la chambre","Le groupe IV de la classification ISO regroupe les instruments d'accès coronaire","La fraise LN peut s'utiliser pour visualiser et atteindre un orifice canalaire calcifié","Les instruments d'accès à la chambre pulpaire sont tous normalisés selon l'ISO"],correct:[0,1,3]}
];

let currentCourse = 0;
let currentQ = 0;
let filter = 'all';
let state = ALL_QUESTIONS.map(() => ({ selected: new Set(), checked: false }));

function getFiltered() {
  return ALL_QUESTIONS.map((q, i) => ({ q, i })).filter(({ q, i }) => {
    if (q.course !== currentCourse) return false;
    if (filter === 'all') return true;
    if (filter === 'unanswered') return !state[i].checked;
    if (filter === 'wrong') return state[i].checked && !isCorrect(i);
    if (filter === 'correct') return state[i].checked && isCorrect(i);
    return true;
  });
}

function isCorrect(i) {
  const q = ALL_QUESTIONS[i], s = state[i];
  const correct = new Set(q.correct);
  if (s.selected.size !== correct.size) return false;
  for (let c of correct) if (!s.selected.has(c)) return false;
  return true;
}

function render() {
  const filtered = getFiltered();
  const pi = document.getElementById('progress-info');
  const qlist = document.getElementById('qlist');
  
  if (filtered.length === 0) {
    pi.innerHTML = '<span>Aucune question dans ce filtre.</span>';
    qlist.innerHTML = '';
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('next-btn').disabled = true;
    renderDashboard();
    return;
  }
  
  if (currentQ >= filtered.length) currentQ = 0;
  const { q, i } = filtered[currentQ];
  
  pi.innerHTML = `<span>Question <strong>${currentQ + 1}</strong> / ${filtered.length}</span><span>(Q${i + 1} global)</span>`;
  
  const s = state[i];
  const checked = s.checked;
  
  let html = `<div class="qcard">
    <div class="qnum">Cours ${currentCourse + 1} — ${COURSES[currentCourse].name}</div>
    <div class="qtext">${q.q}</div>
    <div class="options">`;
    
  const letters = ['A', 'B', 'C', 'D', 'E'];
  q.opts.forEach((opt, oi) => {
    let cls = 'opt';
    if (checked) {
      cls += ' disabled';
      const isRight = q.correct.includes(oi);
      const isSel = s.selected.has(oi);
      if (isRight && isSel) cls += ' correct';
      else if (!isRight && isSel) cls += ' wrong';
      else if (isRight && !isSel) cls += ' missed';
    } else {
      if (s.selected.has(oi)) cls += ' selected';
    }
    const onclick = checked ? '' : `onclick="toggle(${i},${oi})"`;
    html += `<div class="${cls}" ${onclick}>
      <div class="opt-letter">${letters[oi]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  });
  
  html += `</div>`;
  
  if (!checked) {
    html += `<button class="check-btn" onclick="check(${i})" ${s.selected.size === 0 ? 'disabled' : ''}>Vérifier ma réponse</button>`;
  } else {
    const correct = new Set(q.correct);
    const allRight = isCorrect(i);
    const partiallyCorrect = [...s.selected].some(x => correct.has(x)) && !allRight;
    let exCls = allRight ? 'success' : partiallyCorrect ? 'partial' : 'fail';
    let exText = allRight ? '✓ Parfait ! Toutes les bonnes réponses sélectionnées.' :
      partiallyCorrect ? `△ Réponse partielle. Réponses correctes : ${q.correct.map(c => letters[c]).join(', ')}` :
      `✗ Incorrect. Réponses correctes : ${q.correct.map(c => letters[c]).join(', ')}`;
    html += `<div class="explanation ${exCls}">${exText}</div>`;
  }
  
  html += `</div>`;
  qlist.innerHTML = html;
  
  document.getElementById('prev-btn').disabled = currentQ === 0;
  document.getElementById('next-btn').disabled = currentQ >= filtered.length - 1;
  
  updateScore();
  renderDashboard();
}

function toggle(i, oi) {
  if (state[i].checked) return;
  if (state[i].selected.has(oi)) state[i].selected.delete(oi);
  else state[i].selected.add(oi);
  render();
}

function check(i) {
  state[i].checked = true;
  render();
}

function navigate(dir) {
  const filtered = getFiltered();
  currentQ = Math.max(0, Math.min(filtered.length - 1, currentQ + dir));
  render();
}

function setFilter(f) {
  filter = f;
  currentQ = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function updateScore() {
  const courseQs = ALL_QUESTIONS.map((q, i) => ({ q, i })).filter(({ q }) => q.course === currentCourse);
  const checked = courseQs.filter(({ i }) => state[i].checked);
  const correct = checked.filter(({ i }) => isCorrect(i));
  document.getElementById('score-display').textContent = `Score : ${correct.length} / ${checked.length}`;
  
  const totalChecked = ALL_QUESTIONS.filter((_, i) => state[i].checked).length;
  document.getElementById('progress-display').textContent = `Répondues : ${totalChecked} / 80`;
}

function resetCourse() {
  ALL_QUESTIONS.forEach((q, i) => {
    if (q.course === currentCourse) { state[i] = { selected: new Set(), checked: false }; }
  });
  currentQ = 0;
  render();
}

function renderDashboard() {
  const zone = document.getElementById('dashboard-zone');
  
  let globalTotal = ALL_QUESTIONS.length;
  let globalChecked = state.filter(s => s.checked).length;
  let globalCorrect = ALL_QUESTIONS.filter((_, i) => state[i].checked && isCorrect(i)).length;
  let pct = globalChecked > 0 ? Math.round((globalCorrect / globalChecked) * 100) : 0;
  
  let html = `
    <div class="dashboard-card">
      <div class="dashboard-title">Tableau de bord des Résultats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val">${globalChecked} / ${globalTotal}</div>
          <div class="stat-lbl">Questions répondues</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${globalCorrect}</div>
          <div class="stat-lbl">Réponses correctes</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${pct}%</div>
          <div class="stat-lbl">Précision globale</div>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="dashboard-table">
          <thead>
            <tr>
              <th>Cours / Thématique</th>
              <th>Progression</th>
              <th>Score</th>
              <th>Taux</th>
            </tr>
          </thead>
          <tbody>
  `;
  
  COURSES.forEach(c => {
    const qIndices = ALL_QUESTIONS.map((q, idx) => ({ q, idx })).filter(x => x.q.course === c.id);
    const totalC = qIndices.length;
    const checkedC = qIndices.filter(x => state[x.idx].checked).length;
    const correctC = qIndices.filter(x => state[x.idx].checked && isCorrect(x.idx)).length;
    const barPct = Math.round((checkedC / totalC) * 100);
    const successPct = checkedC > 0 ? Math.round((correctC / checkedC) * 100) : 0;
    
    html += `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td>
          <div class="progress-track"><div class="progress-fill" style="width: ${barPct}%"></div></div>
          <span>${checkedC}/${totalC}</span>
        </td>
        <td>${correctC} / ${checkedC}</td>
        <td><span style="color: ${successPct >= 70 ? 'var(--color-success)' : successPct >= 40 ? 'var(--color-warning)' : 'var(--color-error)'}; font-weight:600;">${successPct}%</span></td>
      </tr>
    `;
  });
  
  html += `</tbody></table></div></div>`;
  zone.innerHTML = html;
}

function buildTabs() {
  const el = document.getElementById('course-tabs');
  COURSES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = c.name;
    btn.onclick = () => {
      currentCourse = i;
      currentQ = 0;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    el.appendChild(btn);
  });
}

buildTabs();
render();
</script>

</html>
