<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QCM - Imagerie Médicale (CBCT, OPT, Scanner, IRM)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f7f9fc;
            padding: 20px;
            color: #1a2a3f;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 1.8rem 1.5rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e4b8f, #2c6eaf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .score-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-chip {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            border: 0.5px solid #cbd5e1;
        }

        .course-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
        }

        .tab {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            color: #4a5b6e;
            transition: all 0.2s;
            background: #f1f5f9;
            border: 0.5px solid #cbd5e1;
        }

        .tab.active {
            background: #1e4b8f;
            color: white;
            border-color: #1e4b8f;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .tab:hover:not(.active) {
            background: #e6edf4;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 1.4rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #f8fafc;
            border: 0.5px solid #cbd5e1;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #2c3e50;
            transition: all 0.15s;
        }

        .filter-btn.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }

        .progress-info {
            font-size: 0.85rem;
            color: #4a627a;
            margin-bottom: 1.2rem;
            background: #f8fafc;
            padding: 8px 14px;
            border-radius: 24px;
            display: inline-block;
        }

        .qcard {
            background: white;
            border: 1px solid #e2edf7;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.6rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: 0.1s;
        }

        .qnum {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #5b7a9a;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .qtext {
            font-size: 1.05rem;
            font-weight: 500;
            color: #0f2b3d;
            line-height: 1.45;
            margin-bottom: 1.2rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opt {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            transition: all 0.15s;
        }

        .opt:hover:not(.disabled) {
            background: #f7fafd;
            border-color: #b9d0e7;
        }

        .opt.selected {
            border-color: #1e4b8f;
            background: #eef4fc;
        }

        .opt.correct {
            border-color: #2b6e3c;
            background: #e8f3e8;
        }

        .opt.wrong {
            border-color: #b91c1c;
            background: #fee9e9;
        }

        .opt.missed {
            border-color: #b45309;
            background: #fff0e6;
        }

        .opt-letter {
            width: 28px;
            height: 28px;
            background: #f1f5f9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e293b;
            flex-shrink: 0;
            border: 0.5px solid #cbd5e1;
        }

        .opt.selected .opt-letter {
            background: #1e4b8f;
            color: white;
            border-color: #1e4b8f;
        }

        .opt.correct .opt-letter {
            background: #2b6e3c;
            color: white;
            border-color: #2b6e3c;
        }

        .opt.wrong .opt-letter {
            background: #b91c1c;
            color: white;
            border-color: #b91c1c;
        }

        .opt.missed .opt-letter {
            background: #b45309;
            color: white;
            border-color: #b45309;
        }

        .opt-text {
            font-size: 0.92rem;
            line-height: 1.45;
            color: #1e2f3f;
            flex: 1;
        }

        .check-btn {
            margin-top: 1.3rem;
            background: #1e4b8f;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .check-btn:hover {
            background: #0f3a6b;
        }

        .check-btn:disabled {
            background: #b9cfec;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .explanation {
            margin-top: 1.2rem;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.5;
            background: #fef9e6;
            border-left: 4px solid #f5b042;
        }

        .explanation.success {
            background: #e6f4ea;
            border-left-color: #2b6e3c;
            color: #14532d;
        }

        .explanation.partial {
            background: #fff0e0;
            border-left-color: #c2410c;
            color: #7c2d12;
        }

        .explanation.fail {
            background: #ffe6e6;
            border-left-color: #b91c1c;
            color: #991b1b;
        }

        .nav-row {
            display: flex;
            gap: 14px;
            justify-content: space-between;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-btn, .reset-btn {
            padding: 8px 18px;
            border-radius: 40px;
            border: 0.5px solid #cbd5e1;
            background: white;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .nav-btn:hover, .reset-btn:hover {
            background: #f1f5f9;
        }

        .reset-btn {
            color: #b91c1c;
            border-color: #f1c0c0;
        }

        .reset-btn:hover {
            background: #fee2e2;
        }

        .disabled {
            cursor: default !important;
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.2rem;
            }
            .qcard {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📚 Imagerie médicale – CBCT · OPT · Scanner · IRM</h2>
        <div class="score-bar">
            <div class="score-chip" id="score-display">Score : 0 / 0</div>
            <div class="score-chip" id="progress-display">Répondues : 0 / 120</div>
        </div>
    </div>
    <div class="course-tabs" id="course-tabs"></div>
    <div class="filter-row">
        <button class="filter-btn active" data-filter="all">Toutes</button>
        <button class="filter-btn" data-filter="unanswered">Non répondues</button>
        <button class="filter-btn" data-filter="wrong">Erreurs</button>
        <button class="filter-btn" data-filter="correct">Correctes</button>
    </div>
    <div class="progress-info" id="progress-info"></div>
    <div id="qlist"></div>
    <div class="nav-row">
        <button class="nav-btn" id="prev-btn">← Précédent</button>
        <button class="reset-btn" id="reset-btn">Réinitialiser le cours</button>
        <button class="nav-btn" id="next-btn">Suivant →</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // DONNÉES : 120 questions issues du code imagerie (inchangées)
    // Adaptation au format : {courseId, q, opts, correct}
    // Mapping cours : 0 -> Cone Beam, 1 -> OPT et TDM, 2 -> IRM, 3 -> Scanner
    // --------------------------------------------------------------
    const questionsRaw = [
        // COURS 0 : Cone Beam (30 questions)
        {course:"Cone Beam", q:"Quelle est la différence fondamentale entre la TDM conventionnelle et le CBCT concernant le faisceau de rayons X ?",opts:["La TDM utilise un faisceau conique","Le CBCT utilise un faisceau en éventail","Le CBCT utilise un faisceau conique","La TDM nécessite plusieurs rotations","Le CBCT nécessite de multiples rotations"],correct:[2]},
        {course:"Cone Beam", q:"Parmi les caractéristiques de l'algorithme de reconstruction du CBCT, lesquelles sont vraies ?",opts:["Il s'agit de l'algorithme FDK (Feldkamp, Davis et Kress)","Il produit des voxels anisotropes","Il permet une navigation dans trois plans orthogonaux","Il ne permet pas de rendus volumiques 3D","Les voxels ont des dimensions identiques en x, y et z"],correct:[0,2,4]},
        {course:"Cone Beam", q:"Quels sont les éléments constitutifs principaux d'un appareil CBCT ?",opts:["Un bras rotatif en forme de C","Un tube émettant un faisceau en éventail","Un détecteur bidimensionnel à écran plan","Un panneau de contrôle pour choisir le FOV","Une station informatique sans carte graphique"],correct:[0,2,3]},
        {course:"Cone Beam", q:"Lors de l'acquisition d'un CBCT, la rotation de l'appareil autour de la tête dure généralement :",opts:["De 1 à 2 secondes","De 5 à 40 secondes","Plus de 60 secondes","De 6 à 30 secondes en moyenne","Plusieurs minutes"],correct:[1,3]},
        {course:"Cone Beam", q:"Concernant le nombre de projections (raw data) en CBCT :",opts:["Il varie typiquement de 180 à plus de 1024 images","Un nombre élevé diminue la résolution","Un nombre élevé réduit les artefacts de reconstruction","Un nombre élevé augmente le temps d'examen","Un nombre élevé réduit la dose d'exposition"],correct:[0,2,3]},
        {course:"Cone Beam", q:"En endodontie, le CBCT est principalement indiqué dans quelles situations ?",opts:["En première intention pour le dépistage carieux systématique","En petit champ (FOV réduit)","Pour évaluer les canaux radiculaires oblitérés","En cas de suspicion de résorption radiculaire","Pour évaluer une tumeur maligne infiltrante"],correct:[1,2,3]},
        {course:"Cone Beam", q:"Pour le bilan préopératoire d'une extraction de dent de sagesse, le CBCT est prescrit lorsque le panoramique montre :",opts:["Une indépendance certaine du canal mandibulaire","Une superposition des apex avec le canal mandibulaire","Une dent complètement incluse sans rapport à risque","La présence d'un crochet apical péri-canalaire suspecté","Une inclusion haute avec mésioversion au maxillaire"],correct:[1,3,4]},
        {course:"Cone Beam", q:"En orthodontie, le CBCT petit champ et haute résolution (voxels ≤ 125 µm) est utile pour diagnostiquer :",opts:["L'analyse globale pour chirurgie orthognathique","Une ankylose dentaire","Une fente palatine","Une hypercémentose débutante","Une résorption externe liée à une dent incluse"],correct:[1,3,4]},
        {course:"Cone Beam", q:"Concernant l'évaluation des sinus et de l'ATM par CBCT :",opts:["Il est recommandé en cas de suspicion d'infection fongique sinusienne","Il constitue une alternative à la TDM pour la rhinosinusite chronique","Il détecte efficacement l'arthrose condylienne","Il est la méthode de choix pour évaluer les tissus mous de l'ATM","Il détecte la condensation des pièces osseuses de l'ATM"],correct:[1,2,4]},
        {course:"Cone Beam", q:"Parmi les inconvénients majeurs du CBCT, on retrouve :",opts:["Une irradiation supérieure à celle d'un scanner conventionnel","Une faible résolution de contraste pour les tissus mous","L'incapacité d'explorer les pathologies tumorales infiltrantes","Des densités exprimées en Unités Hounsfield absolues fiables","Une résolution spatiale inférieure à celle de la TDM"],correct:[1,2]},
        {course:"Cone Beam", q:"Quelles sont les causes et conséquences des artefacts cinétiques au CBCT ?",opts:["Ils sont liés aux restaurations métalliques","Ils sont dus au mouvement du patient (déglutition)","Ils créent des bandes noires et blanches","Ils provoquent un flou de l'image","Ils causent un dédoublement des structures"],correct:[1,3,4]},
        {course:"Cone Beam", q:"L'artefact de durcissement du faisceau (beam hardening) se caractérise par :",opts:["Une atténuation différentielle des rayons X","Des zones hyperdenses artificielles près des structures denses","Un flou cinétique","La disparition de l'émail dentaire sur l'image","L'apparition de stries métalliques directes"],correct:[0,1]},
        {course:"Cone Beam", q:"En comparaison avec le scanner conventionnel (CT), le CBCT :",opts:["Nécessite un renforcement spécifique du plancher","A un coût environ 3 à 5 fois inférieur","Dispose d'un équipement plus léger et compact","Possède des pixels plus grands","Peut s'installer facilement dans un cabinet dentaire"],correct:[1,2,4]},
        {course:"Cone Beam", q:"La préparation et l'installation du patient pour un CBCT incluent :",opts:["Le retrait systématique des objets métalliques","Une position obligatoirement allongée","L'utilisation d'une mentonnière et d'un appui-tête","La réalisation d'un topogramme (scout view) pour le centrage","L'injection obligatoire d'un produit de contraste"],correct:[0,2,3]},
        {course:"Cone Beam", q:"Comment l'algorithme de reconstruction gère-t-il les données brutes du CBCT ?",opts:["Il utilise une carte graphique basse performance","Il effectue une rétroprojection filtrée","Il reconstruit un volume anatomique en 3D","Il transforme des voxels isotropes en pixels anisotropes","Il encode les données finales en format DICOM"],correct:[1,2,4]},
        {course:"Cone Beam", q:"Qu'est-ce qui influence la dose d'exposition et la résolution spatiale en CBCT ?",opts:["La taille du champ de vue (FOV)","Le temps d'apnée du patient","Le nombre de projections acquises","La température de la salle","Les paramètres kV et mA"],correct:[0,2,4]},
        {course:"Cone Beam", q:"Dans le cadre de l'implantologie, l'intérêt du CBCT réside dans :",opts:["La visualisation optimale des volumes osseux","La mesure de la densité osseuse en UH strictes","L'appréciation de l'architecture de l'os spongieux","L'évaluation précise des rapports anatomiques","L'exploration détaillée des fascias musculaires"],correct:[0,2,3]},
        {course:"Cone Beam", q:"À quel moment l'invention du CBCT dentaire a-t-elle eu lieu ?",opts:["En 1972 par Godfrey Hounsfield","En 1997 par Arai","Sous le nom initial d'Ortho-CT","En 1946 par Felix Bloch","En 2023"],correct:[1,2]},
        {course:"Cone Beam", q:"Pour un CBCT à 'champ moyen' (8 cm) ou 'petit' (4-6 cm) en orthodontie, les indications comprennent :",opts:["L'analyse globale pour chirurgie orthognathique","Les inclusions dentaires et kystes associés","Les anomalies de nombre","Les fentes palatines","L'évaluation des tissus mous pharyngés"],correct:[1,2,3]},
        {course:"Cone Beam", q:"Les valeurs de densité en CBCT sont :",opts:["Des Unités Hounsfield absolues","Codées sur 12 ou 14 bits en niveaux de gris","Relatives et dépendantes du FOV","Variantes selon la position du patient et les artefacts","Aussi précises que la TDM pour l'analyse quantitative de l'os"],correct:[1,2,3]},
        {course:"Cone Beam", q:"Quels artefacts sont typiquement liés aux amalgames ou implants au CBCT ?",opts:["Artefacts de mouvement","Stries d'artéfacts métalliques","Bandes noires et blanches","Dédoublement de l'image","Artefact de durcissement du faisceau périphérique"],correct:[1,2,4]},
        {course:"Cone Beam", q:"Laquelle de ces affirmations sur le capteur d'un CBCT est exacte ?",opts:["Il se trouve du même côté que le tube à rayons X","C'est un détecteur bidimensionnel à écran plat","Il capture l'image en effectuant de multiples rotations","Il intercepte le faisceau conique après la traversée du patient","Il transforme les données numériques en signaux analogiques"],correct:[1,3]},
        {course:"Cone Beam", q:"Lors d'un examen CBCT, le topogramme (scout view) sert principalement à :",opts:["Détecter les caries interproximales","Centrer précisément l'examen","Définir la zone exacte d'exploration (FOV)","Visualiser les tissus mous","Créer le rendu volumique final"],correct:[1,2]},
        {course:"Cone Beam", q:"En CBCT, quelles sont les caractéristiques des voxels ?",opts:["Ils sont anisotropes","Leurs dimensions x, y et z sont strictement identiques","Leur isotropie empêche la reconstruction curviligne","Ils permettent des reconstructions multiplanaires sans déformation","Leur taille n'affecte pas la résolution"],correct:[1,3]},
        {course:"Cone Beam", q:"Quelles recommandations s'appliquent pour les caries dentaires au CBCT ?",opts:["C'est l'examen de dépistage de première intention","Les radiographies rétro-coronaires (bite wing) restent supérieures","Elles doivent être ignorées lors de l'interprétation d'un CBCT implantologique","Elles doivent être signalées si découvertes fortuitement","Le CBCT remplace totalement le bite wing"],correct:[1,3]},
        {course:"Cone Beam", q:"Un petit champ (FOV) en CBCT a pour conséquence :",opts:["Une résolution spatiale augmentée","Une résolution spatiale diminuée","Une dose d'irradiation augmentée pour le patient","Une dose d'irradiation diminuée pour le patient","L'impossibilité de voir la structure fine de la dent"],correct:[0,3]},
        {course:"Cone Beam", q:"Concernant l'exploration des lésions kystiques par CBCT :",opts:["Il permet d'identifier les kystes odontogènes de grande taille","Il différencie parfaitement le contenu liquidien d'un tissu tumoral malin","Il est formellement indiqué pour explorer une suspicion de malignité","Il identifie les tumeurs bénignes calcifiées","Il montre très bien l'extension osseuse de la lésion"],correct:[0,3,4]},
        {course:"Cone Beam", q:"Comment se comporte le faisceau de rayons X dans le CBCT ?",opts:["Il est continu ou pulsé","Il couvre tout l'organe en une seule rotation complète","Il irradie uniquement le plan transversal d'une coupe","Il diverge en forme de cône depuis le tube","Il nécessite le mouvement du lit du patient"],correct:[0,1,3]},
        {course:"Cone Beam", q:"Lors du bilan d'une dent de sagesse mandibulaire au CBCT, le praticien cherche à évaluer :",opts:["La morphologie radiculaire précise de la dent","L'épaisseur de la gencive marginale","Les rapports exacts avec la 2ème molaire","L'intégrité de la corticale du canal mandibulaire","Le flux sanguin intra-pulpaire"],correct:[0,2,3]},
        {course:"Cone Beam", q:"Le volume reconstruit par le CBCT permet de générer :",opts:["Des coupes axiales","Des coupes coronales","Des coupes sagittales","Des courbes curvilignes (panoramiques reconstruites)","Des reconstructions orthogonales à la crête"],correct:[0,1,2,3,4]},
        // COURS 1 : OPT et TDM (30 questions)
        {course:"OPT et TDM", q:"Le principe de l'orthopantomogramme (OPT) repose sur :",opts:["La tomographie rotative à faisceau conique","La tomographie rotative à faisceau étroit","L'acquisition d'images 3D natives","Un axe focal net avec un flou de balayage externe","L'émission d'un champ magnétique puissant"],correct:[1,3]},
        {course:"OPT et TDM", q:"Parmi les critères de qualité d'un OPT, on recherche :",opts:["La visibilité parfaite des deux condyles mandibulaires","Une asymétrie entre les branches montantes pour l'effet de profondeur","Le palais dur projeté au-dessus des apex maxillaires","Une bande radioclaire sombre sur les apex si la langue est bien placée","L'absence d'artefacts métalliques"],correct:[0,2,4]},
        {course:"OPT et TDM", q:"Si le patient n'applique pas sa langue contre le palais lors d'un OPT :",opts:["Une bande radio-opaque masque les dents mandibulaires","Une bande radioclaire (air pharyngé) barre les apex maxillaires","Cela simule de fausses lésions de lyse apicale","Le contraste global du cliché est amélioré","Une image fantôme de la langue apparaît"],correct:[1,2]},
        {course:"OPT et TDM", q:"Concernant l'image fantôme sur un OPT :",opts:["Elle provient d'un objet de faible densité","Elle est générée par un objet situé en dehors du plan focal","Elle se projette de façon nette et précise","Elle se projette du côté opposé à sa position réelle","Elle apparaît surélevée et floue"],correct:[1,3,4]},
        {course:"OPT et TDM", q:"Dans la méthodologie de lecture d'un OPT, le balayage de la région mandibulaire permet d'évaluer :",opts:["Les apophyses styloïdes","Le bord antérieur et postérieur de la branche montante","Le foramen mentonnier","L'échancrure sigmoïde et le coroné","La suture inter-maxillaire"],correct:[1,2,3]},
        {course:"OPT et TDM", q:"Au scanner (TDM), la 'fenêtre osseuse' est essentielle pour analyser :",opts:["La trame osseuse trabéculaire","La graisse infra-temporale","La continuité des tables corticales","Les muscles masticateurs","Les structures dentaires minéralisées"],correct:[0,2,4]},
        {course:"OPT et TDM", q:"La classification de Lodwick décrit l'ostéolyse géographique (Type I) comme :",opts:["Une lésion très agressive","IA : contours nets avec liseré d'ostéosclérose","IB : contours nets sans liseré","IC : contours mal visibles","Une lésion perméative"],correct:[1,2,3]},
        {course:"OPT et TDM", q:"Un processus pathologique malin infiltrant à la mandibule se caractérise radiologiquement par :",opts:["Une ostéolyse mitée ou perméative","Des limites floues et mal définies","Une soufflure harmonique régulière de la corticale","Une réaction périostée spiculée (en feu d'herbe) ou un éperon de Codman","Une rhizalyse extrêmement nette et régulière des dents adjacentes"],correct:[0,1,3]},

        {course:"Scanner", q:"Qu'appelle-t-on 'scanner multibarrettes' ?",opts:["Un scanner qui utilise plusieurs aimants","Un appareil possédant plusieurs rangées de détecteurs","Une technique qui permet une acquisition plus rapide","Un scanner qui n'utilise pas de rayons X","Un scanner à haute résolution isotrope utilisé sans tube rotatif"],correct:[1,2]},
        {course:"Scanner", q:"Le logiciel DentaScan est particulièrement précieux pour :",opts:["La recherche de caries précoces","Apprécier la distance exacte entre le rebord de crête et le canal alvéolaire inférieur","Générer des coupes orthogonales (transaxiales) le long de l'arcade","Étudier l'inflammation des tissus gingivaux","Réaliser des sialographies virtuelles"],correct:[1,2]},
        {course:"Scanner", q:"Une zone isodense au scanner :",opts:["Est noire, comme l'air","A la même densité (le même gris) que le tissu adjacent","Est difficile à distinguer sans injection de produit de contraste","Est caractéristique de l'émail dentaire pur","Apparaît toujours blanche"],correct:[1,2]},
        {course:"Scanner", q:"Le diagnostic de pathologie des glandes salivaires au scanner peut mettre en évidence :",opts:["Des lithiases canalaires (calculs radio-opaques)","Des tumeurs parotidiennes (masse hypodense ou prenant le contraste)","Des kystes radiculaires","Un élargissement de l'espace desmodontal","Une infection des muscles masticateurs adjacents"],correct:[0,1]},
        {course:"Scanner", q:"Si un patient est agité ou déglutit pendant le balayage scanner :",opts:["L'image présentera des stries hyperdenses","L'image sera nette mais sous-exposée","L'image présentera un artefact cinétique (flou)","Le faisceau durcira localement","Un dédoublement des structures osseuses peut survenir"],correct:[2,4]},
        {course:"Scanner", q:"Un abcès dentaire compliqué d'une cellulite au scanner injecté se présentera souvent comme :",opts:["Une collection liquidienne centrale (hypodense)","Une prise de contraste (hyperdense) en anneau de sa coque périphérique","Un nodule purement osseux (+1000 UH)","Une infiltration de la graisse sous-cutanée","Une image strictement identique au tissu musculaire sain"],correct:[0,1,3]},
        {course:"Scanner", q:"L'équipement de la salle de scanner inclut obligatoirement :",opts:["Une cage de Faraday","Un pupitre de commande protégé par une vitre plombée","Le statif (gantry)","La table motorisée","Des bobines de gradient radiofréquence"],correct:[1,2,3]},
        {course:"Scanner", q:"Parmi ces pathologies traumatiques, le scanner est l'examen de choix pour :",opts:["Les microfêlures de l'émail","Les fractures complexes du tiers moyen de la face","L'évaluation du plancher de l'orbite après un choc","La luxation méniscale de l'ATM","Les fractures basi-crâniennes associées"],correct:[1,2,4]},
        {course:"Scanner", q:"Pour un bilan pré-chirurgical implantaire d'un seul édentement, quelle est la recommandation actuelle ?",opts:["Le Scanner en première intention","Le CBCT en première intention car moins irradiant et précis pour l'os","L'IRM pour vérifier la gencive","Le panoramique seul suffit toujours","L'échographie dentaire"],correct:[1]},
        {course:"Scanner", q:"Une lésion qui absorbe beaucoup de rayons X au scanner sera codée :",opts:["Avec une valeur de Hounsfield négative","Avec une valeur de Hounsfield très élevée (positive)","En noir (clarté)","En blanc (opacité/hyperdensité)","Comme une collection aérique"],correct:[1,3]}
    ];

    // Transformation en ALL_QUESTIONS avec id de cours
    const courseMap = {
        "Cone Beam": 0,
        "OPT et TDM": 1,
        "IRM": 2,
        "Scanner": 3
    };
    const COURSES = [
        { id: 0, name: "Cone Beam", short: "CBCT" },
        { id: 1, name: "OPT et TDM", short: "OPT/TDM" },
        { id: 2, name: "IRM", short: "IRM" },
        { id: 3, name: "Scanner", short: "Scanner" }
    ];

    const ALL_QUESTIONS = questionsRaw.map(item => ({
        course: courseMap[item.course],
        q: item.q,
        opts: item.opts,
        correct: item.correct
    }));

    // ---------- logique identique au premier code ----------
    let currentCourse = 0;
    let currentQ = 0;
    let filter = 'all';
    let state = ALL_QUESTIONS.map(() => ({ selected: new Set(), checked: false }));

    function getFiltered() {
        return ALL_QUESTIONS.map((q, i) => ({ q, i })).filter(({ q, i }) => {
            if (q.course !== currentCourse) return false;
            if (filter === 'all') return true;
            if (filter === 'unanswered') return !state[i].checked;
            if (filter === 'wrong') return state[i].checked && !isCorrect(i);
            if (filter === 'correct') return state[i].checked && isCorrect(i);
            return true;
        });
    }

    function isCorrect(i) {
        const q = ALL_QUESTIONS[i];
        const s = state[i];
        const correctSet = new Set(q.correct);
        if (s.selected.size !== correctSet.size) return false;
        for (let c of correctSet) if (!s.selected.has(c)) return false;
        return true;
    }

    function render() {
        const filtered = getFiltered();
        const pi = document.getElementById('progress-info');
        if (filtered.length === 0) {
            pi.textContent = 'Aucune question dans ce filtre.';
            document.getElementById('qlist').innerHTML = '';
            return;
        }
        if (currentQ >= filtered.length) currentQ = 0;
        const { q, i } = filtered[currentQ];
        pi.textContent = `Question ${currentQ+1} / ${filtered.length} (Q${i+1} global)`;
        const s = state[i];
        const checked = s.checked;
        const letters = ['A', 'B', 'C', 'D', 'E'];
        let html = `<div class="qcard">
            <div class="qnum">${COURSES[currentCourse].name} · Question ${i+1}</div>
            <div class="qtext">${q.q}</div>
            <div class="options">`;
        q.opts.forEach((opt, oi) => {
            let cls = 'opt';
            if (checked) {
                cls += ' disabled';
                const isRight = q.correct.includes(oi);
                const isSel = s.selected.has(oi);
                if (isRight && isSel) cls += ' correct';
                else if (!isRight && isSel) cls += ' wrong';
                else if (isRight && !isSel) cls += ' missed';
            } else {
                if (s.selected.has(oi)) cls += ' selected';
            }
            const onclick = checked ? '' : `onclick="toggle(${i},${oi})"`;
            html += `<div class="${cls}" ${onclick}>
                <div class="opt-letter">${letters[oi]}</div>
                <div class="opt-text">${opt}</div>
            </div>`;
        });
        html += `</div>`;
        if (!checked) {
            html += `<button class="check-btn" onclick="check(${i})" ${s.selected.size === 0 ? 'disabled' : ''}>Vérifier ma réponse</button>`;
        } else {
            const allRight = isCorrect(i);
            const partiallyCorrect = [...s.selected].some(x => q.correct.includes(x)) && !allRight;
            let exCls = allRight ? 'success' : (partiallyCorrect ? 'partial' : 'fail');
            let exText = allRight ? '✓ Parfait ! Toutes les bonnes réponses sélectionnées.' :
                (partiallyCorrect ? `△ Réponse partielle. Bonnes réponses : ${q.correct.map(c=>letters[c]).join(', ')}` :
                `✗ Incorrect. Bonnes réponses : ${q.correct.map(c=>letters[c]).join(', ')}`);
            html += `<div class="explanation ${exCls}">${exText}</div>`;
        }
        html += `</div>`;
        document.getElementById('qlist').innerHTML = html;
        document.getElementById('prev-btn').disabled = currentQ === 0;
        document.getElementById('next-btn').disabled = currentQ >= filtered.length - 1;
        updateScore();
    }

    function toggle(i, oi) {
        if (state[i].checked) return;
        if (state[i].selected.has(oi)) state[i].selected.delete(oi);
        else state[i].selected.add(oi);
        render();
    }

    function check(i) {
        state[i].checked = true;
        render();
    }

    function navigate(dir) {
        const filtered = getFiltered();
        currentQ = Math.max(0, Math.min(filtered.length - 1, currentQ + dir));
        render();
    }

    function setFilter(f) {
        filter = f;
        currentQ = 0;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.filter-btn[data-filter="${f}"]`).classList.add('active');
        render();
    }

    function updateScore() {
        const courseQs = ALL_QUESTIONS.map((q, idx) => ({ q, idx })).filter(({ q }) => q.course === currentCourse);
        const checked = courseQs.filter(({ idx }) => state[idx].checked);
        const correct = checked.filter(({ idx }) => isCorrect(idx));
        document.getElementById('score-display').textContent = `Score : ${correct.length} / ${checked.length}`;
        const totalAnswered = ALL_QUESTIONS.filter((_, idx) => state[idx].checked).length;
        document.getElementById('progress-display').textContent = `Répondues : ${totalAnswered} / 120`;
    }

    function resetCourse() {
        ALL_QUESTIONS.forEach((q, i) => {
            if (q.course === currentCourse) {
                state[i] = { selected: new Set(), checked: false };
            }
        });
        currentQ = 0;
        render();
    }

    function buildTabs() {
        const container = document.getElementById('course-tabs');
        COURSES.forEach((c, idx) => {
            const btn = document.createElement('button');
            btn.className = 'tab' + (idx === 0 ? ' active' : '');
            btn.textContent = c.name;
            btn.onclick = () => {
                currentCourse = idx;
                currentQ = 0;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                render();
            };
            container.appendChild(btn);
        });
    }

    // Event listeners
    document.getElementById('prev-btn').addEventListener('click', () => navigate(-1));
    document.getElementById('next-btn').addEventListener('click', () => navigate(1));
    document.getElementById('reset-btn').addEventListener('click', resetCourse);
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => setFilter(btn.getAttribute('data-filter')));
    });

    buildTabs();
    render();
</script>
</body>
</html>
